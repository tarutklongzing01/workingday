<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>บันทึกงานหน้างาน</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Kanit',sans-serif;background:#0f172a;color:#f1f5f9;}
.btn{padding:18px;border-radius:16px;font-weight:bold;font-size:18px;}
.card{background:#1e293b;border:1px solid #334155;}
</style>
</head>

<body class="p-4">

<div class="max-w-md mx-auto space-y-6">

<h1 class="text-2xl font-bold text-center text-cyan-400">บันทึกงานหน้างาน</h1>
<p id="userDisplay" class="text-center text-xs text-slate-400"></p>

<div class="card p-4 rounded-2xl space-y-4">

<label class="text-sm text-slate-400">วันที่</label>
<input type="date" id="work_date" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700">

<label class="text-sm text-slate-400">สถานะงาน</label>
<div class="grid grid-cols-3 gap-2">
<button onclick="setStatus('เต็มวัน')" class="btn bg-emerald-600">เต็มวัน</button>
<button onclick="setStatus('ครึ่งวัน')" class="btn bg-yellow-500 text-black">ครึ่งวัน</button>
<button onclick="setStatus('หยุด')" class="btn bg-slate-600">หยุด</button>
</div>

<label class="text-sm text-slate-400">จำนวนรอบซ่อม</label>
<input type="number" id="repair_count" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700" placeholder="0">

<label class="text-sm text-slate-400">OT (ชั่วโมง)</label>
<input type="number" step="0.5" id="ot_hours" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700" placeholder="0">

<button onclick="saveWork()" class="btn w-full bg-cyan-500 text-black mt-4">💾 บันทึกงาน</button>

</div>

<a href="index.html" class="block text-center text-slate-400 text-sm">← กลับหน้า Dashboard</a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",authDomain:"database55.firebaseapp.com",projectId:"database55"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const colRef=collection(db,"employees","emp_001","work_logs");

let currentStatus="ทำงาน";

onAuthStateChanged(auth,async u=>{
if(!u) window.location.replace("login.html");
else{
const emp=await getDoc(doc(db,"employees","emp_001"));
userDisplay.textContent="พนักงาน: "+emp.data().name;
work_date.value=new Date().toISOString().split('T')[0];
}
});

window.setStatus=(s)=>{currentStatus=s;}

window.saveWork=async()=>{
await addDoc(colRef,{
work_date:work_date.value,
work_status:currentStatus,
repair_count:Number(repair_count.value||0),
ot_hours:Number(ot_hours.value||0)
});
alert("บันทึกสำเร็จ");
repair_count.value=0;
ot_hours.value=0;
}
</script>

</body>
</html>

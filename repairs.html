<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายงานวิ่งซ่อม</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Kanit', sans-serif; background:#0f172a; color:#f8fafc; }
.pdf-table { width:100%; border-collapse:collapse; margin-top:20px; }
.pdf-table th { background:#1e293b; color:white; border:1px solid #cbd5e1; padding:12px; }
.pdf-table td { border:1px solid #cbd5e1; padding:10px; text-align:center; color:#334155; }
</style>
</head>

<body class="p-8">

<div class="max-w-3xl mx-auto">

<div class="flex justify-between mb-6">
  <a href="index.html" class="text-slate-400 hover:text-white">← กลับหน้าหลัก</a>
  <div class="flex gap-3">
    <button onclick="generatePDF()" class="bg-emerald-600 px-6 py-2 rounded-xl font-bold">📄 PDF</button>
    <button onclick="generateJPG()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">🖼 JPG</button>
  </div>
</div>

<div id="report-area" class="bg-white p-10 rounded-3xl text-slate-900 shadow-2xl">

  <div class="flex justify-between border-b pb-6 mb-8">
    <div>
      <h1 class="text-2xl font-bold">รายงานวิ่งซ่อม</h1>
      <p id="employeeName" class="text-slate-500 text-sm"></p>
      <p id="employeePos" class="text-slate-400 text-xs"></p>
    </div>
    <div class="text-right">
      <p class="text-[10px] text-slate-400 uppercase">รวม</p>
      <p class="text-4xl font-black text-blue-600">
        <span id="totalRounds">0</span> <small class="text-sm">รอบ</small>
      </p>
    </div>
  </div>

  <table class="pdf-table">
    <thead>
      <tr><th>ลำดับ</th><th>วันที่</th><th>จำนวนรอบ</th></tr>
    </thead>
    <tbody id="repairBody"></tbody>
  </table>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",
  authDomain: "database55.firebaseapp.com",
  projectId: "database55"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const workLogsRef = collection(db, "employees", "emp_001", "work_logs");
const empRef = doc(db, "employees", "emp_001");

onAuthStateChanged(auth, async user => {
  if (!user) window.location.replace("login.html");
  else {
    const emp = await getDoc(empRef);
    employeeName.innerText = "พนักงาน: " + emp.data().name;
    employeePos.innerText = "ตำแหน่ง: " + emp.data().position;
    fetchRepairs();
  }
});

async function fetchRepairs() {
  const snap = await getDocs(workLogsRef);
  const data = [];

  snap.forEach(d => {
    const r = d.data();
    if (r.repair_count > 0) data.push(r);
  });

  // 🔥 เรียงวันที่จากเก่า → ใหม่
  data.sort((a,b)=>new Date(a.work_date)-new Date(b.work_date));

  let total = 0, i = 1, html = "";
  data.forEach(r => {
    total += Number(r.repair_count);
    html += `<tr>
      <td>${i++}</td>
      <td>${new Date(r.work_date).toLocaleDateString('th-TH')}</td>
      <td>${r.repair_count}</td>
    </tr>`;
  });

  repairBody.innerHTML = html;
  totalRounds.innerText = total;
}

window.generatePDF = () => {
  html2pdf().set({
    margin: 10,
    filename: 'repair-report.pdf',
    html2canvas: { scale: 3 }
  }).from(document.getElementById('report-area')).save();
};

window.generateJPG = async () => {
  const element = document.getElementById("report-area");
  const canvas = await html2canvas(element, { scale: 3, backgroundColor: "#ffffff" });
  const link = document.createElement("a");
  link.download = "repair-report.jpg";
  link.href = canvas.toDataURL("image/jpeg", 1.0);
  link.click();
};
</script>

</body>
</html>

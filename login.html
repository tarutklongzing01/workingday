<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Work Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; overflow: hidden; }
        .bg-dark { background: #0f172a; }
        .glass-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-style {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.2s;
        }
        .input-style:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
        }
    </style>
</head>
<body class="bg-dark text-slate-200 flex items-center justify-center min-h-screen p-4">

    <div class="glass-box p-8 rounded-[2rem] w-full max-w-[360px] shadow-2xl">
        
        <div class="flex items-center gap-4 mb-8">
            <div class="p-3 rounded-2xl bg-orange-500/20 text-orange-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-white leading-tight">ลงชื่อเข้าใช้</h2>
                <p class="text-xs text-slate-400">Work Tracking System</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 ml-1 mb-1 uppercase tracking-widest">Email</label>
                <input id="email" type="email" placeholder="example@mail.com" 
                    class="input-style w-full px-4 py-3 rounded-xl text-sm outline-none">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 ml-1 mb-1 uppercase tracking-widest">Password</label>
                <input id="password" type="password" placeholder="••••••••" 
                    class="input-style w-full px-4 py-3 rounded-xl text-sm outline-none">
            </div>

            <div class="pt-2">
                <button id="btnLogin" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-semibold py-3 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
                    <span>เข้าสู่ระบบ</span>
                </button>
                <p id="msg" class="text-red-400 text-[11px] text-center mt-2 min-h-[1rem]"></p>
            </div>
        </div>

        <div class="mt-6 pt-6 border-t border-white/5 text-center">
            <p class="text-slate-500 text-[9px] uppercase tracking-[0.2em]">© 2026 Management Tool</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",
        authDomain: "database55.firebaseapp.com",
        projectId: "database55",
        storageBucket: "database55.appspot.com",
        messagingSenderId: "420284740539",
        appId: "1:420284740539:web:8495fd9fa017ddf3ffca9e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) window.location.replace("index.html");
    });

    const btnLogin = document.getElementById('btnLogin');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const msg = document.getElementById('msg');

    btnLogin.onclick = async () => {
        if (!email.value || !password.value) {
            msg.textContent = "กรุณากรอกข้อมูลให้ครบถ้วน";
            return;
        }

        msg.textContent = "";
        btnLogin.disabled = true;
        const originalContent = btnLogin.innerHTML;
        btnLogin.innerHTML = `<span class="animate-pulse">กำลังตรวจสอบ...</span>`;

        try {
            await signInWithEmailAndPassword(auth, email.value, password.value);
            window.location.replace("index.html");
        } catch (e) {
            msg.textContent = "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
            btnLogin.disabled = false;
            btnLogin.innerHTML = originalContent;
        }
    };

    password.addEventListener("keypress", (e) => {
        if (e.key === "Enter") btnLogin.click();
    });
</script>

</body>
</html>

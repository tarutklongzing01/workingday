<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Work Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .bg-animate {
            background: radial-gradient(circle at top right, #334155, #0f172a);
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-focus:focus {
            border-color: #fb923c;
            box-shadow: 0 0 0 2px rgba(251, 146, 60, 0.2);
        }
    </style>
</head>
<body class="bg-animate text-white flex items-center justify-center min-h-screen p-4">

    <div class="fixed top-1/4 left-1/4 w-64 h-64 bg-orange-600/20 rounded-full blur-[100px] -z-10"></div>
    <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-amber-600/10 rounded-full blur-[100px] -z-10"></div>

    <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm space-y-8 shadow-2xl relative">
        
        <div class="text-center space-y-2">
            <div class="inline-flex p-4 rounded-3xl bg-orange-500/10 text-orange-500 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-black text-white tracking-tight uppercase">Login</h2>
            <p class="text-slate-400 text-sm">เข้าสู่ระบบเพื่อจัดการงานของคุณ</p>
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 ml-1 uppercase tracking-widest">Email Address</label>
                <input id="email" type="email" placeholder="email@example.com" 
                    class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white outline-none input-focus transition-all">
            </div>
            
            <div class="space-y-1">
                <label class="text-xs font-bold text-slate-400 ml-1 uppercase tracking-widest">Password</label>
                <input id="password" type="password" placeholder="••••••••" 
                    class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white outline-none input-focus transition-all">
            </div>
        </div>

        <div class="space-y-4 pt-2">
            <button id="btnLogin" class="w-full bg-gradient-to-r from-orange-500 to-amber-600 hover:from-orange-400 hover:to-amber-500 text-white font-black p-4 rounded-2xl shadow-lg shadow-orange-900/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>เข้าสู่ระบบ</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
            <p id="msg" class="text-red-400 text-sm text-center font-medium min-h-[1.25rem]"></p>
        </div>

        <div class="text-center">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">© 2026 Work Tracking System</p>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",
    authDomain: "database55.firebaseapp.com",
    projectId: "database55",
    storageBucket: "database55.appspot.com",
    messagingSenderId: "420284740539",
    appId: "1:420284740539:web:8495fd9fa017ddf3ffca9e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (user) window.location.replace("index.html");
});

function getErrorMessage(error){
    switch(error.code){
        case 'auth/invalid-email': return 'อีเมลไม่ถูกต้อง';
        case 'auth/user-not-found': return 'ไม่พบบัญชีนี้';
        case 'auth/wrong-password': return 'รหัสผ่านไม่ถูกต้อง';
        case 'auth/too-many-requests': return 'ลองใหม่ภายหลัง';
        default: return 'เข้าสู่ระบบไม่สำเร็จ';
    }
}

const btnLogin = document.getElementById('btnLogin');
const email = document.getElementById('email');
const password = document.getElementById('password');
const msg = document.getElementById('msg');

btnLogin.onclick = async () => {
    if (!email.value || !password.value) {
        msg.textContent = "กรุณากรอกข้อมูลให้ครบถ้วน";
        return;
    }

    msg.textContent = "";
    btnLogin.disabled = true;
    btnLogin.innerHTML = `
        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>กำลังเข้าสู่ระบบ...</span>
    `;

    try {
        await signInWithEmailAndPassword(auth, email.value, password.value);
        window.location.replace("index.html");
    } catch (e) {
        msg.textContent = getErrorMessage(e);
        btnLogin.disabled = false;
        btnLogin.innerHTML = `<span>เข้าสู่ระบบ</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>`;
    }
};

password.addEventListener("keypress", (e)=>{
    if(e.key === "Enter") btnLogin.click();
});
</script>

</body>
</html>

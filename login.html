<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Work Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body{
            font-family:'Kanit',sans-serif;
            overflow-x:hidden;
            background:
                radial-gradient(circle at top left, rgba(249,115,22,0.12), transparent 30%),
                radial-gradient(circle at bottom right, rgba(59,130,246,0.08), transparent 28%),
                #0f172a;
        }
        .glass-box{
            background: rgba(30, 41, 59, 0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .input-style{
            background: rgba(15,23,42,0.88);
            border: 1px solid rgba(71,85,105,0.55);
            color: #e2e8f0;
            transition: all .2s ease;
        }
        .input-style::placeholder{
            color: #64748b;
        }
        .input-style:focus{
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
        }
        .btn-login{
            background: linear-gradient(135deg, #f97316, #ea580c);
        }
        .btn-login:hover{
            filter: brightness(1.05);
        }
        .btn-google{
            background: #ffffff;
            color: #0f172a;
        }
        .btn-google:hover{
            background: #f8fafc;
        }
    </style>
</head>
<body class="text-slate-200 flex items-center justify-center min-h-screen p-4">

    <div class="glass-box p-8 rounded-[2rem] w-full max-w-[390px]">
        <div class="flex items-center gap-4 mb-8">
            <div class="p-3 rounded-2xl bg-orange-500/15 text-orange-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white leading-tight">ลงชื่อเข้าใช้</h1>
                <p class="text-xs text-slate-400">Work Tracking System</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 ml-1 mb-1 uppercase tracking-widest">
                    Email
                </label>
                <input
                    id="email"
                    type="email"
                    placeholder="example@mail.com"
                    autocomplete="email"
                    class="input-style w-full px-4 py-3 rounded-xl text-base outline-none"
                />
            </div>

            <div>
                <label class="block text-[10px] font-bold text-slate-500 ml-1 mb-1 uppercase tracking-widest">
                    Password
                </label>
                <div class="relative">
                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        class="input-style w-full px-4 py-3 pr-14 rounded-xl text-base outline-none"
                    />
                    <button
                        id="togglePassword"
                        type="button"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white text-xs font-medium"
                    >
                        แสดง
                    </button>
                </div>
            </div>

            <div class="pt-2 space-y-3">
                <button
                    id="btnLogin"
                    type="button"
                    class="btn-login w-full text-white font-semibold py-3 rounded-xl shadow-lg transition-all active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed"
                >
                    เข้าสู่ระบบด้วย Email
                </button>

                <button
                    id="btnGoogle"
                    type="button"
                    class="btn-google w-full font-semibold py-3 rounded-xl shadow-lg transition-all active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-3"
                >
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.196 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                        <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                        <path fill="#4CAF50" d="M24 44c5.177 0 9.86-1.977 13.409-5.193l-6.19-5.238C29.144 35.091 26.676 36 24 36c-5.176 0-9.625-3.326-11.29-7.946l-6.522 5.025C9.5 39.556 16.227 44 24 44z"/>
                        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.084 5.569l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                    </svg>
                    <span>เข้าสู่ระบบด้วย Google</span>
                </button>

                <p id="msg" class="text-red-400 text-[12px] text-center mt-3 min-h-[1.4rem] break-words"></p>
            </div>
        </div>

        <div class="mt-6 pt-6 border-t border-white/5 text-center">
            <p class="text-slate-500 text-[9px] uppercase tracking-[0.2em]">© 2026 Management Tool</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getAuth,
        setPersistence,
        browserLocalPersistence,
        signInWithEmailAndPassword,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged,
        signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import {
        getFirestore,
        doc,
        getDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",
        authDomain: "database55.firebaseapp.com",
        projectId: "database55",
        storageBucket: "database55.appspot.com",
        messagingSenderId: "420284740539",
        appId: "1:420284740539:web:8495fd9fa017ddf3ffca9e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const btnLogin = document.getElementById("btnLogin");
    const btnGoogle = document.getElementById("btnGoogle");
    const msg = document.getElementById("msg");
    const togglePassword = document.getElementById("togglePassword");

    function showMessage(text, isError = true) {
        msg.textContent = text;
        msg.className = isError
            ? "text-red-400 text-[12px] text-center mt-3 min-h-[1.4rem] break-words"
            : "text-emerald-400 text-[12px] text-center mt-3 min-h-[1.4rem] break-words";
    }

    function setLoading(loading, type = "email") {
        btnLogin.disabled = loading;
        btnGoogle.disabled = loading;

        btnLogin.innerHTML = loading && type === "email"
            ? `<span class="animate-pulse">กำลังเข้าสู่ระบบ...</span>`
            : `เข้าสู่ระบบด้วย Email`;

        btnGoogle.innerHTML = loading && type === "google"
            ? `<span class="animate-pulse">กำลังเข้าสู่ระบบด้วย Google...</span>`
            : `
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.655 32.657 29.196 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                    <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.053 6.053 29.277 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                    <path fill="#4CAF50" d="M24 44c5.177 0 9.86-1.977 13.409-5.193l-6.19-5.238C29.144 35.091 26.676 36 24 36c-5.176 0-9.625-3.326-11.29-7.946l-6.522 5.025C9.5 39.556 16.227 44 24 44z"/>
                    <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.084 5.569l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                </svg>
                <span>เข้าสู่ระบบด้วย Google</span>
            `;
    }

    function getThaiFirebaseError(code) {
        switch (code) {
            case "auth/invalid-email":
                return "รูปแบบอีเมลไม่ถูกต้อง";
            case "auth/user-disabled":
                return "บัญชีนี้ถูกปิดใช้งาน";
            case "auth/user-not-found":
                return "ไม่พบบัญชีนี้ในระบบ";
            case "auth/wrong-password":
                return "รหัสผ่านไม่ถูกต้อง";
            case "auth/invalid-credential":
                return "อีเมลหรือรหัสผ่านไม่ถูกต้อง หรือบัญชีนี้เป็น Google login";
            case "auth/popup-closed-by-user":
                return "คุณปิดหน้าต่าง Google login";
            case "auth/popup-blocked":
                return "เบราว์เซอร์บล็อก popup กรุณาอนุญาต popup ก่อน";
            case "auth/account-exists-with-different-credential":
                return "อีเมลนี้มีบัญชีอยู่แล้ว แต่ใช้คนละวิธีเข้าสู่ระบบ";
            case "auth/network-request-failed":
                return "เชื่อมต่ออินเทอร์เน็ตไม่ได้ หรือเครือข่ายมีปัญหา";
            case "auth/operation-not-allowed":
                return "ยังไม่ได้เปิดใช้งาน provider นี้ใน Firebase";
            default:
                return "เข้าสู่ระบบไม่สำเร็จ";
        }
    }

    async function checkAdmin(user) {
        const adminRef = doc(db, "admins", user.uid);
        const adminSnap = await getDoc(adminRef);

        if (!adminSnap.exists()) return false;

        const data = adminSnap.data();
        return data.active === true && data.role === "admin";
    }

    async function allowOnlyAdmin(user) {
        const isAdmin = await checkAdmin(user);

        if (!isAdmin) {
            await signOut(auth);
            showMessage("บัญชีนี้ไม่มีสิทธิ์เข้าใช้งานระบบ");
            return false;
        }

        window.location.replace("index.html");
        return true;
    }

    togglePassword.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePassword.textContent = isHidden ? "ซ่อน" : "แสดง";
    });

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;

        try {
            await allowOnlyAdmin(user);
        } catch (error) {
            console.error("AUTH STATE ERROR:", error);
            await signOut(auth);
            showMessage("ตรวจสอบสิทธิ์ไม่สำเร็จ");
        }
    });

    async function handleEmailLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
            showMessage("กรุณากรอกอีเมลและรหัสผ่านให้ครบ");
            return;
        }

        showMessage("", true);
        setLoading(true, "email");

        try {
            await setPersistence(auth, browserLocalPersistence);
            const result = await signInWithEmailAndPassword(auth, email, password);
            await allowOnlyAdmin(result.user);
        } catch (error) {
            console.error("EMAIL LOGIN ERROR:", error);
            showMessage(`${getThaiFirebaseError(error.code)}${error.code ? " (" + error.code + ")" : ""}`);
            setLoading(false, "email");
        }
    }

    async function handleGoogleLogin() {
        showMessage("", true);
        setLoading(true, "google");

        try {
            await setPersistence(auth, browserLocalPersistence);
            const result = await signInWithPopup(auth, provider);
            await allowOnlyAdmin(result.user);
        } catch (error) {
            console.error("GOOGLE LOGIN ERROR:", error);
            showMessage(`${getThaiFirebaseError(error.code)}${error.code ? " (" + error.code + ")" : ""}`);
            setLoading(false, "google");
        }
    }

    btnLogin.addEventListener("click", handleEmailLogin);
    btnGoogle.addEventListener("click", handleGoogleLogin);

    [emailInput, passwordInput].forEach((input) => {
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                handleEmailLogin();
            }
        });
    });
</script>

</body>
</html>

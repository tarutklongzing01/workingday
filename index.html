```html
<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Work Dashboard - Modern Edition</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Kanit',sans-serif;
background: radial-gradient(circle at top left,#1e293b,#0f172a);
color:#f1f5f9;
min-height:100vh;
}

.glass-card{
background:rgba(30,41,59,0.7);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 8px 32px rgba(0,0,0,0.37);
}

.btn-hover{
transition:0.2s;
}

.btn-hover:hover{
transform:translateY(-1px);
}

</style>

</head>

<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto space-y-6">

<div class="flex justify-between items-center">

<h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 bg-clip-text text-transparent">
WORK DASHBOARD
</h1>

<div id="userDisplay" class="text-slate-400 text-sm">
กำลังโหลดข้อมูลพนักงาน...
</div>

<button onclick="logout()" class="bg-red-500/20 px-4 py-2 rounded-lg">
Logout
</button>

</div>



<div class="glass-card p-6 rounded-2xl">

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">

<input type="date" id="work_date" class="p-3 rounded-xl bg-slate-900 border border-slate-700">

<select id="work_status" class="p-3 rounded-xl bg-slate-900 border border-slate-700">

<option value="เต็มวัน">เต็มวัน</option>
<option value="ครึ่งวัน">ครึ่งวัน</option>
<option value="หยุด">วันหยุด</option>

</select>

<input type="number" id="repair_count" placeholder="รอบซ่อม" class="p-3 rounded-xl bg-slate-900 border border-slate-700">

<input type="number" id="ot_hours" placeholder="OT ชั่วโมง" class="p-3 rounded-xl bg-slate-900 border border-slate-700">

<button onclick="addData()" class="bg-cyan-500 text-black font-bold rounded-xl">
บันทึก
</button>

</div>

</div>



<div class="glass-card rounded-2xl overflow-hidden">

<table class="w-full text-center">

<thead class="bg-slate-900">

<tr>

<th class="p-3">วันที่</th>
<th>สถานะ</th>
<th>ซ่อม</th>
<th>OT</th>
<th>ลบ</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>



<div class="glass-card p-6 rounded-2xl">

<h2 class="text-xl text-emerald-400 mb-4">
สรุปรายได้
</h2>

<div class="grid grid-cols-2 gap-3">

<div>วันเต็ม: <span id="fullDays">0</span></div>
<div>รอบซ่อม: <span id="repairs">0</span></div>

<div>ค่าแรงเต็มวัน: ฿<span id="cashFull">0</span></div>
<div>ค่าแรงครึ่งวัน: ฿<span id="cashHalf">0</span></div>

<div>ค่าซ่อม: ฿<span id="cashRepair">0</span></div>
<div>OT: ฿<span id="cashOT">0</span></div>

</div>

<div class="text-3xl font-bold text-emerald-400 mt-4">
รวม: ฿<span id="totalCash">0</span>
</div>

</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck",
authDomain:"database55.firebaseapp.com",
projectId:"database55"
};


const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const colRef=collection(db,"employees","emp_001","work_logs");
const empRef=doc(db,"employees","emp_001");



onAuthStateChanged(auth,async user=>{

if(!user){

window.location.replace("login.html");
return;

}

const emp=await getDoc(empRef);
const data=emp.data();

userDisplay.innerHTML=`
พนักงาน: <strong>${data.name}</strong>
| แผนก: ${data.position}
`;

loadData();

});



window.logout=()=>signOut(auth);



window.addData=async()=>{

if(!work_date.value){
alert("เลือกวันที่ก่อน");
return;
}

await addDoc(colRef,{

work_date:work_date.value,
work_status:work_status.value,
repair_count:Number(repair_count.value||0),
ot_hours:Number(ot_hours.value||0)

});

work_date.value="";
repair_count.value="";
ot_hours.value="";

loadData();

};



async function loadData(){

const snap=await getDocs(colRef);

const data=[];
snap.forEach(d=>data.push({id:d.id,...d.data()}));

tableBody.innerHTML="";

let s={f:0,h:0,r:0,o:0,holidayOT:0};



data.forEach(row=>{

tableBody.innerHTML+=`

<tr>

<td class="p-3">${row.work_date}</td>

<td>${row.work_status}</td>

<td>${row.repair_count}</td>

<td>${row.ot_hours}</td>

<td>
<button onclick="deleteRow('${row.id}')"
class="text-red-400">ลบ</button>
</td>

</tr>

`;

if(row.work_status==="เต็มวัน") s.f++;
if(row.work_status==="ครึ่งวัน") s.h++;

s.r+=Number(row.repair_count||0);

if(row.work_status==="หยุด" && row.ot_hours>0){

s.holidayOT+=942;

}else{

s.o+=Number(row.ot_hours||0);

}

});



const cf=s.f*471;
const ch=s.h*235.5;
const cr=s.r*50;
const co=(s.o*60)+s.holidayOT;

fullDays.textContent=s.f;
repairs.textContent=s.r;

cashFull.textContent=cf.toLocaleString();
cashHalf.textContent=ch.toLocaleString();
cashRepair.textContent=cr.toLocaleString();
cashOT.textContent=co.toLocaleString();

totalCash.textContent=(cf+ch+cr+co+900).toLocaleString();

}



window.deleteRow=async(id)=>{

await deleteDoc(doc(db,"employees","emp_001","work_logs",id));

loadData();

};

</script>

</body>
</html>
```

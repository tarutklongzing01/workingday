<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Analytics Dashboard - Year 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #f1f5f9; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .chart-container { position: relative; height: 300px; width: 100%; }

        /* Custom Dropdown Styling */
        .custom-select-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .custom-select {
            appearance: none;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #f8fafc;
            border: 1px solid rgba(251, 146, 60, 0.4);
            padding: 10px 45px 10px 45px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fb923c' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 1.1em;
        }

        .custom-select:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: #fb923c;
            box-shadow: 0 0 20px rgba(251, 146, 60, 0.25);
            transform: translateY(-2px);
        }

        .custom-select:focus {
            border-color: #fb923c;
            box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2);
        }

        .custom-select option {
            background: #1e293b;
            color: #f1f5f9;
        }

        .icon-calendar {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #fb923c;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-4xl font-black bg-gradient-to-r from-orange-400 via-amber-500 to-orange-600 bg-clip-text text-transparent uppercase tracking-tight">📊 Analytics 2569</h1>
                <div class="flex items-center gap-4 mt-6">
                    <span class="text-slate-400 text-sm font-bold tracking-wide uppercase">รอบวิกประจำเดือน</span>
                    <div class="custom-select-wrapper group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 icon-calendar" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <select id="monthPicker" class="custom-select"></select>
                    </div>
                </div>
            </div>
            <a href="index.html" class="px-6 py-3 bg-slate-800/50 hover:bg-slate-700/80 backdrop-blur-md rounded-2xl text-slate-300 text-sm font-semibold border border-slate-700/50 flex items-center gap-2 transition-all shadow-lg hover:scale-105 active:scale-95">
                <span>←</span> กลับหน้าหลัก
            </a>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <div class="glass-card p-6 rounded-[2rem] border-l-4 border-emerald-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1 tracking-widest">ทำงานเต็มวัน</p>
                <h2 class="text-4xl font-black text-white"><span id="statFull">0</span> <small class="text-sm font-normal text-emerald-500">วัน</small></h2>
            </div>
            <div class="glass-card p-6 rounded-[2rem] border-l-4 border-yellow-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1 tracking-widest">ทำงานครึ่งวัน</p>
                <h2 class="text-4xl font-black text-white"><span id="statHalf">0</span> <small class="text-sm font-normal text-yellow-500">วัน</small></h2>
            </div>
            <div class="glass-card p-6 rounded-[2rem] border-l-4 border-red-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1 tracking-widest">วันหยุด</p>
                <h2 class="text-4xl font-black text-white"><span id="statOff">0</span> <small class="text-sm font-normal text-red-500">วัน</small></h2>
            </div>
            <div class="glass-card p-6 rounded-[2rem] border-l-4 border-orange-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1 tracking-widest">รอบซ่อมรวม</p>
                <h2 class="text-4xl font-black text-white"><span id="statTotalRepairs">0</span> <small class="text-sm font-normal text-orange-500">รอบ</small></h2>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-[2.5rem]">
                <h3 class="text-orange-400 font-bold mb-4 flex items-center gap-2">🔧 สถิติการวิ่งซ่อมรายวัน</h3>
                <div class="chart-container"><canvas id="repairsChart"></canvas></div>
            </div>
            <div class="glass-card p-6 rounded-[2.5rem]">
                <h3 class="text-yellow-400 font-bold mb-4 flex items-center gap-2">🌗 สถิติวันทำงานครึ่งวัน</h3>
                <div class="chart-container"><canvas id="halfDayChart"></canvas></div>
            </div>
        </div>

        <div class="glass-card p-6 md:p-10 rounded-[3rem]">
            <h3 class="text-orange-400 font-bold mb-6 flex items-center gap-2 text-xl">💰 แนวโน้มรายได้ (บาท)</h3>
            <div class="chart-container" style="height: 400px;"><canvas id="incomeChart"></canvas></div>
        </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey:"AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck", authDomain:"database55.firebaseapp.com", projectId:"database55" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const colRef = collection(db,"employees","emp_001","work_logs");

    let allData = [];
    let charts = {};
    const monthsNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    const picker = document.getElementById('monthPicker');
    function initPicker() {
        const targetYear = 2026; 
        const now = new Date();
        const currentMonth = now.getMonth();
        
        for (let i = currentMonth + 1; i >= 0; i--) {
            if (i > 11) continue; 
            let val = `${targetYear}-${i}`;
            let label = `${monthsNames[i]} ${targetYear + 543}`;
            let selected = (i === currentMonth) ? "selected" : "";
            picker.innerHTML += `<option value="${val}" ${selected}>${label}</option>`;
        }
    }

    onAuthStateChanged(auth, async u => {
        if (!u) window.location.replace("login.html");
        else {
            initPicker();
            const snap = await getDocs(colRef);
            snap.forEach(doc => allData.push(doc.data()));
            updateDashboard();
        }
    });

    function updateDashboard() {
        if (allData.length === 0) return;
        const [year, month] = picker.value.split('-').map(Number);
        
        const startDate = new Date(year, month - 1, 26, 0, 0, 0);
        const endDate = new Date(year, month, 25, 23, 59, 59);

        const filtered = allData.filter(r => {
            const d = new Date(r.work_date);
            return d >= startDate && d <= endDate;
        }).sort((a,b) => new Date(a.work_date) - new Date(b.work_date));

        let stats = { full:0, half:0, off:0, repairs:0 };
        let chartData = { repairs:{}, halfDay:{}, income:{} };

        filtered.forEach(r => {
            if(r.work_status === 'เต็มวัน') stats.full++;
            else if(r.work_status === 'ครึ่งวัน') stats.half++;
            else if(r.work_status === 'หยุด') stats.off++;
            stats.repairs += Number(r.repair_count || 0);

            const dObj = new Date(r.work_date);
            const label = `${dObj.getDate()} ${monthsNames[dObj.getMonth()].substring(0,3)}`;
            
            chartData.repairs[label] = Number(r.repair_count || 0);
            chartData.halfDay[label] = (r.work_status === 'ครึ่งวัน' ? 1 : 0);
            
            const income = (r.work_status==='เต็มวัน'? 471 : r.work_status==='ครึ่งวัน'? 235.5 : 0) 
                         + (Number(r.repair_count)*50) 
                         + (Number(r.ot_hours || 0)*60);
            chartData.income[label] = income;
        });

        document.getElementById('statFull').innerText = stats.full;
        document.getElementById('statHalf').innerText = stats.half;
        document.getElementById('statOff').innerText = stats.off;
        document.getElementById('statTotalRepairs').innerText = stats.repairs;

        renderChart("repairsChart", "รอบซ่อม", chartData.repairs, "bar", "#fb923c");
        renderChart("halfDayChart", "ทำงานครึ่งวัน", chartData.halfDay, "line", "#facc15");
        renderChart("incomeChart", "รายได้รายวัน", chartData.income, "line", "#fb923c", true);
    }

    function renderChart(id, label, data, type, color, fill = false) {
        if (charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        
        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, color + '66');
        gradient.addColorStop(1, color + '00');

        charts[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: Object.keys(data),
                datasets: [{
                    label: label, data: Object.values(data), borderColor: color,
                    backgroundColor: fill ? gradient : color + '44', borderWidth: 3, tension: 0.4, fill: fill, pointRadius: 4, pointBackgroundColor: color
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)',
                        titleFont: { family: 'Kanit' },
                        bodyFont: { family: 'Kanit' },
                        callbacks: {
                            label: function(context) {
                                if (id === "halfDayChart") {
                                    return context.parsed.y === 1 ? "🌗 ทำงานครึ่งวัน" : "❌ ไม่ใช่ครึ่งวัน";
                                }
                                return context.dataset.label + ": " + context.parsed.y.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: id === "halfDayChart" ? 1.2 : undefined,
                        ticks: { 
                            color: '#94a3b8',
                            stepSize: id === "halfDayChart" ? 1 : undefined,
                            font: { family: 'Kanit' }
                        }, 
                        grid: { color: 'rgba(255,255,255,0.05)' } 
                    },
                    x: { 
                        ticks: { color: '#94a3b8', font: { family: 'Kanit' } }, 
                        grid: { display: false } 
                    }
                }
            }
        });
    }

    picker.onchange = updateDashboard;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Analytics Dashboard - Orange Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #f1f5f9; 
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .chart-container { position: relative; height: 300px; width: 100%; }
        select { 
            background: #1e293b; 
            color: #fb923c; 
            border: 1px solid #475569; 
            padding: 8px 16px; 
            border-radius: 12px; 
            outline: none; 
            cursor: pointer;
            font-weight: bold;
        }
        select:focus { border-color: #fb923c; box-shadow: 0 0 0 2px rgba(251, 146, 60, 0.2); }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-4xl font-black bg-gradient-to-r from-orange-400 via-amber-500 to-orange-600 bg-clip-text text-transparent uppercase">📊 Analytics</h1>
                <div class="flex items-center gap-3 mt-3">
                    <span class="text-slate-400 text-sm">เลือกรอบเดือนที่ต้องการ:</span>
                    <select id="monthPicker"></select>
                </div>
            </div>
            <a href="index.html" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 text-sm border border-slate-700 flex items-center gap-2 transition-all">
                <span>←</span> กลับหน้าหลัก
            </a>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-emerald-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1">ทำงานเต็มวัน</p>
                <h2 class="text-3xl font-black"><span id="statFull">0</span> <small class="text-sm font-normal text-emerald-400">วัน</small></h2>
            </div>
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-yellow-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1">ทำงานครึ่งวัน</p>
                <h2 class="text-3xl font-black"><span id="statHalf">0</span> <small class="text-sm font-normal text-yellow-400">วัน</small></h2>
            </div>
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-red-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1">วันหยุด</p>
                <h2 class="text-3xl font-black"><span id="statOff">0</span> <small class="text-sm font-normal text-red-400">วัน</small></h2>
            </div>
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-orange-500">
                <p class="text-slate-400 text-xs uppercase font-bold mb-1">รอบซ่อมรวม</p>
                <h2 class="text-3xl font-black"><span id="statTotalRepairs">0</span> <small class="text-sm font-normal text-orange-400">รอบ</small></h2>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-orange-400 font-bold mb-4 flex items-center gap-2">🔧 สถิติการวิ่งซ่อมรายวัน</h3>
                <div class="chart-container"><canvas id="repairsChart"></canvas></div>
            </div>
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-orange-400 font-bold mb-4 flex items-center gap-2">⏰ ชั่วโมง OT รายวัน</h3>
                <div class="chart-container"><canvas id="otChart"></canvas></div>
            </div>
        </div>

        <div class="glass-card p-6 md:p-8 rounded-[2.5rem]">
            <h3 class="text-orange-400 font-bold mb-6 flex items-center gap-2 text-xl">💰 กราฟรายได้ในรอบเดือนนี้</h3>
            <div class="chart-container" style="height: 400px;"><canvas id="incomeChart"></canvas></div>
        </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey:"AIzaSyARVRI8rgPGRoZis4j8jIbYbe3AOYEq2ck", authDomain:"database55.firebaseapp.com", projectId:"database55" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const colRef = collection(db,"employees","emp_001","work_logs");

    let allData = [];
    let charts = {};
    const monthsNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    // 1. สร้าง Dropdown เดือน (ย้อนหลัง 12 เดือน)
    const picker = document.getElementById('monthPicker');
    function initPicker() {
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            let val = `${d.getFullYear()}-${d.getMonth()}`;
            let label = `${monthsNames[d.getMonth()]} ${d.getFullYear() + 543}`;
            picker.innerHTML += `<option value="${val}">${label}</option>`;
        }
    }

    // 2. โหลดข้อมูลจาก Firebase
    onAuthStateChanged(auth, async u => {
        if (!u) window.location.replace("login.html");
        else {
            initPicker();
            const snap = await getDocs(colRef);
            snap.forEach(doc => allData.push(doc.data()));
            updateDashboard(); // รันครั้งแรก
        }
    });

    // 3. ฟังก์ชันหลักสำหรับคำนวณและอัปเดต Dashboard
    function updateDashboard() {
        const [year, month] = picker.value.split('-').map(Number);
        
        // กฎการตัดรอบ: 26 เดือนก่อนหน้า - 25 เดือนปัจจุบัน
        const startDate = new Date(year, month - 1, 26, 0, 0, 0);
        const endDate = new Date(year, month, 25, 23, 59, 59);

        // กรองข้อมูล
        const filtered = allData.filter(r => {
            const d = new Date(r.work_date);
            return d >= startDate && d <= endDate;
        }).sort((a,b) => new Date(a.work_date) - new Date(b.work_date));

        // ตัวแปรเก็บผลลัพธ์
        let stats = { full:0, half:0, off:0, repairs:0 };
        let chartData = { repairs:{}, ot:{}, income:{} };

        filtered.forEach(r => {
            // นับสถิติ
            if(r.work_status === 'เต็มวัน') stats.full++;
            else if(r.work_status === 'ครึ่งวัน') stats.half++;
            else if(r.work_status === 'หยุด') stats.off++;
            stats.repairs += Number(r.repair_count || 0);

            // เตรียมข้อมูลกราฟ
            const dObj = new Date(r.work_date);
            const label = `${dObj.getDate()} ${monthsNames[dObj.getMonth()].substring(0,3)}`;
            
            chartData.repairs[label] = Number(r.repair_count || 0);
            chartData.ot[label] = Number(r.ot_hours || 0);
            
            const income = (r.work_status==='เต็มวัน'? 471 : r.work_status==='ครึ่งวัน'? 235.5 : 0) 
                         + (Number(r.repair_count)*50) 
                         + (Number(r.ot_hours)*60);
            chartData.income[label] = income;
        });

        // อัปเดตตัวเลขหน้าจอ
        document.getElementById('statFull').innerText = stats.full;
        document.getElementById('statHalf').innerText = stats.half;
        document.getElementById('statOff').innerText = stats.off;
        document.getElementById('statTotalRepairs').innerText = stats.repairs;

        // วาดกราฟ
        renderChart("repairsChart", "รอบซ่อม", chartData.repairs, "bar", "#fb923c");
        renderChart("otChart", "ชั่วโมง OT", chartData.ot, "line", "#f59e0b");
        renderChart("incomeChart", "รายได้รายวัน (บาท)", chartData.income, "line", "#fb923c", true);
    }

    function renderChart(id, label, data, type, color, fill = false) {
        if (charts[id]) charts[id].destroy(); // เคลียร์กราฟเก่า
        
        const ctx = document.getElementById(id).getContext('2d');
        const labels = Object.keys(data);
        const values = Object.values(data);

        charts[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: values,
                    borderColor: color,
                    backgroundColor: fill ? color + '44' : color + '88',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: fill,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                }
            }
        });
    }

    // จับเหตุการณ์การเปลี่ยนเดือน
    picker.onchange = updateDashboard;

</script>
</body>
</html>
